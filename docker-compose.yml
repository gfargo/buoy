services:
  buoy:
    image: ghcr.io/gfargo/buoy:latest
    container_name: buoy
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./buoy.yaml:/config/buoy.yaml:ro
      - buoy-data:/data
      # Optional: mount a plugins directory for custom plugins
      # - ./plugins:/plugins:ro
    environment:
      - BUOY_AUTH_TOKEN=${BUOY_AUTH_TOKEN:-}
    # Required for full host metrics (temp, disk mounts, NVMe SMART)
    privileged: true
    pid: host

volumes:
  buoy-data:
